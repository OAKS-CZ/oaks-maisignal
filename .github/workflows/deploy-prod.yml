name: Deploy Prod

on:
  push:
    tags:
      - "prod-*"

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: eu-central-1
  ECR_REPO: maisignal
  ECS_TASK_FAMILY: maisignal-prod-task

jobs:
  deploy:
    name: Promote to Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Verify image exists in ECR
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws ecr describe-images \
            --repository-name "$ECR_REPO" \
            --image-ids imageTag="$IMAGE_TAG" \
            > /dev/null
          echo "Image $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG verified."

      - name: Register new ECS task definition
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "$ECS_TASK_FAMILY" \
            --query 'taskDefinition')

          NEW_TASK_DEF=$(echo "$TASK_DEF" | \
            jq --arg IMAGE "$ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG" \
            '.containerDefinitions[0].image = $IMAGE |
             del(.taskDefinitionArn, .revision, .status,
                 .requiresAttributes, .compatibilities,
                 .registeredAt, .registeredBy)')

          aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF"

          VERSION="${GITHUB_REF_NAME#prod-}"
          echo "### Deployed to production" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** \`$VERSION\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image:** \`$ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Task family:** \`$ECS_TASK_FAMILY\`" >> "$GITHUB_STEP_SUMMARY"
